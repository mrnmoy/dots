"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
[ пМГ ]()\
$directory\
$git_branch\
$git_status\
$nodejs\
$rust\
$golang\
$php\
\n$character"""

[directory]
style = ""
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "вА¶/"

[directory.substitutions]
"Documents" = "у∞ИЩ "
"Downloads" = "пАЩ "
"Music" = "пАБ "
"Pictures" = "пАЊ "
"Media" = "пАЊ "

[git_branch]
symbol = "пРШ"
style = "bg:crust"
format = '[[ $symbol $branch ](fg:mauve bg:crust)]($style)'

[git_status]
style = "bg:crust"
format = '[[($all_status$ahead_behind )](fg:mauve bg:crust)]($style)'

[nodejs]
symbol = "оЬШ"
style = "bg:mantle"
format = '[[ $symbol ($version) ](fg:mauve bg:mantle)]($style)'

[rust]
symbol = "оЮ®"
style = "bg:mantle"
format = '[[ $symbol ($version) ](fg:mauve bg:mantle)]($style)'

[golang]
symbol = "оШІ"
style = "bg:mantle"
format = '[[ $symbol ($version) ](fg:mauve bg:mantle)]($style)'

[php]
symbol = "оШИ"
style = "bg:mantle"
format = '[[ $symbol ($version) ](fg:mauve bg:mantle)]($style)'

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:crust"
format = '[[ пРЇ $time ](fg:mauve bg:crust)]($style)'

source = ~/.config/themes/colors.conf

decoration {
    rounding = 16
    rounding_power = 2
    # active_opacity = 1.0
    # inactive_opacity = 0.6
    # fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 0
        passes = 5
        contrast = 1
        brightness = 1
        # vibrancy = 0
        # vibrancy_darkness = 0
        popups = true
        popups_ignorealpha = 0.0
        special = false #expensive
        new_optimizations = true
        xray = true 
        input_methods = true
        input_methods_ignorealpha = 0.0
    }
    shadow {
        enabled = true
        range = 12
        render_power = 4
        color = $primary
        color_inactive = $surface 
    }
}

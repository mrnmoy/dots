source = ~/.config/themes/colors.conf

decoration {
    rounding = 16
    rounding_power = 2

    blur {
        enabled = true
        size = 8
        passes = 2
        noise = 0
        contrast = 1.25
        brightness = 0.5
        vibrancy = 1
        vibrancy_darkness = 0
        ignore_opacity = true
        new_optimizations = true
        special = true
        xray = false
        popups = true
        popups_ignorealpha = 0.0
        input_methods = true
        input_methods_ignorealpha = 0.0
    }
    shadow {
        enabled = true
        range = 4
        render_power = 2
        color = $primary
        color_inactive = $surface 
    }
    # glow {
    #     enabled = true
    # }
}

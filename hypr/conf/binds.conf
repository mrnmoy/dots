$mainMod = SUPER

# Actions
bind = $mainMod, X, killactive 
bind = $mainMod, Q, exec, wlogout -b 4 
bind = $mainMod, E, exec, thunar
bind = $mainMod, T, togglefloating 
bind = $mainMod, F, fullscreen 
# bind = $mainMod, P, pseudo, 
# bind = $mainMod, J, togglesplit, 
bind = $mainMod SHIFT, B, exec, ~/.config/hypr/scripts/reload.sh 

bind = $mainMod, RETURN, exec, alacritty
bind = $mainMod, N, exec, alacritty --title nvim --command nvim 
bind = $mainMod, B, exec, zen-browser
bind = $mainMod, M, exec, swaync-client -t -sw

# Media Controls
bind = $mainMod ALT, RETURN, exec, alacritty --title rmpc --command rmpc
bind = $mainMod ALT, SPACE, exec, mpc toggle
bind = $mainMod ALT, H, exec, mpc seek -5%
bind = $mainMod ALT, L, exec, mpc seek +5%
bind = $mainMod ALT, N, exec, mpc next
bind = $mainMod ALT, P, exec, mpc prev
# bind = $mainMod ALT, K, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
# bind = $mainMod ALT, J, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = $mainMod ALT, K, exec, amixer set Master 5%+
bind = $mainMod ALT, J, exec, amixer set Master 5%-

# Display Controls
bind = $mainMod CTRL, K, exec, ../scripts/brightness.sh +
bind = $mainMod CTRL, J, exec, ../scripts/brightness.sh -

# bind = $mainMod, SPACE, exec, vicinae toggle
# bind = $mainMod, SPACE, exec, hyprlauncher
bind = $mainMod, SPACE, exec, rofi -show drun -theme ~/.config/rofi/launcher.rasi
# bind = $mainMod, C, exec, rofi -show calc -modi calc -no-show-match -no-sort
# bind = $mainMod SHIFT, SPACE, exec, rofi -show filebrowser & sleep 0.2; hyprctl dispatch focuswindow "^(Rofi)"

bind = $mainMod, S, exec, hyprshot -m window --freeze
bind = $mainMod ALT, S, exec, hyprshot -m region --freeze
# bind = $mainMod, S, exec, hyprshot -zm window
# bind = $mainMod ALT, S, exec, hyprshot -zm region

bind = $mainMod SHIFT, Q, exec, hyprlock

# bind = $mainMod, P, exec, kitty --class clipse -e 'clipse'
bind = $mainMod, P, exec, cliphist list | rofi -dmenu -theme ~/.config/rofi/clipboard.rasi | cliphist decode | wl-copy
# bind = $mainMod SHIFT, P, exec, passmenu
bind = $mainMod SHIFT, P, exec, qtpass
# bind = $mainMod SHIFT, J, overview:toggle
bind = $mainMod SHIFT, H, workspace, e-1
bind = $mainMod SHIFT, L, workspace, e+1
# bind = $mainMod SHIFT, J, hyprexpo:expo, toggle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l 
bind = $mainMod, right, movefocus, r 
bind = $mainMod, up, movefocus, u 
bind = $mainMod, down, movefocus, d 

bind = $mainMod, H, movefocus, l 
bind = $mainMod, L, movefocus, r 
bind = $mainMod, K, movefocus, u 
bind = $mainMod, J, movefocus, d 

# Switch workspaces with mainMod + [0-9]
bind = $mainMod SHIFT, X, workspace, 1
bind = $mainMod SHIFT, C, workspace, 2
bind = $mainMod SHIFT, V, workspace, 3
bind = $mainMod SHIFT, S, workspace, 4
bind = $mainMod SHIFT, D, workspace, 5
bind = $mainMod SHIFT, F, workspace, 6
bind = $mainMod SHIFT, W, workspace, 7
bind = $mainMod SHIFT, E, workspace, 8
bind = $mainMod SHIFT, R, workspace, 9
bind = $mainMod SHIFT, SPACE, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod, 1, movetoworkspace, 1
bind = $mainMod, 2, movetoworkspace, 2
bind = $mainMod, 3, movetoworkspace, 3
bind = $mainMod, 4, movetoworkspace, 4
bind = $mainMod, 5, movetoworkspace, 5
bind = $mainMod, 6, movetoworkspace, 6
bind = $mainMod, 7, movetoworkspace, 7
bind = $mainMod, 8, movetoworkspace, 8
bind = $mainMod, 9, movetoworkspace, 9
bind = $mainMod, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1 
bind = $mainMod, mouse_up, workspace, e-1 

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow 
bindm = $mainMod, mouse:273, resizewindow 


# bind = $mainMod, C, movetoworkspace, special
